name: CodeQL

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  code-ql:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: github/codeql-action/init@e58424170fb0262c8d7ed60a2e84b9bffe205c67
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@e58424170fb0262c8d7ed60a2e84b9bffe205c67

      - uses: github/codeql-action/analyze@e58424170fb0262c8d7ed60a2e84b9bffe205c67
        with:
          category: /language:${{matrix.language}}
